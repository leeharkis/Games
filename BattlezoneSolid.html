<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Battlezone - Solid</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; overflow: hidden; }
canvas { display: block; width: 100vw; height: 100vh; }
</style>
</head>
<body>
<canvas id="cv"></canvas>
<script>
// ============================================================
// BATTLEZONE SOLID - Filled 3D Tank Game
// ============================================================

var cv = document.getElementById('cv');
var gl = cv.getContext('2d');
var W, H;

function resize() {
    W = cv.width = window.innerWidth;
    H = cv.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// ============================================================
// CONSTANTS
// ============================================================
var FOV = 60 * Math.PI / 180;
var NEAR = 5;
var FAR = 1200;
var GROUND_Y = 0; // ground plane at y=0 in world (we use xz as ground plane)

// ============================================================
// PLAYER STATE
// ============================================================
var cam = { x: 0, z: 0, rot: 0 }; // position on xz plane, rotation around y
var camY = 10; // camera height above ground
var speed = 0;
var turnRate = 0;
var alive = true;
var score = 0;
var kills = 0;
var lives = 3;
var level = 1;
var shellInFlight = null; // only one shell at a time like original
var shellSpeed = 12;
var bangTimer = 0; // shows BANG! on screen when firing

// ============================================================
// INPUT
// ============================================================
var input = { fwd: false, back: false, left: false, right: false, fire: false };

document.addEventListener('keydown', function(e) {
    switch(e.code) {
        case 'KeyW': case 'ArrowUp': input.fwd = true; break;
        case 'KeyS': case 'ArrowDown': input.back = true; break;
        case 'KeyA': case 'ArrowLeft': input.left = true; break;
        case 'KeyD': case 'ArrowRight': input.right = true; break;
        case 'Space': e.preventDefault(); input.fire = true; break;
    }
});

document.addEventListener('keyup', function(e) {
    switch(e.code) {
        case 'KeyW': case 'ArrowUp': input.fwd = false; break;
        case 'KeyS': case 'ArrowDown': input.back = false; break;
        case 'KeyA': case 'ArrowLeft': input.left = false; break;
        case 'KeyD': case 'ArrowRight': input.right = false; break;
        case 'Space': input.fire = false; break;
    }
});

// ============================================================
// 3D PROJECTION
// ============================================================
// World uses: X = left/right, Y = up, Z = forward/back
// Camera looks along its local Z axis (into the screen)

function projectPoint(wx, wy, wz) {
    // Translate to camera space
    var dx = wx - cam.x;
    var dz = wz - cam.z;
    var dy = wy - camY;
    
    // Rotate around Y axis by cam.rot
    var cos = Math.cos(cam.rot);
    var sin = Math.sin(cam.rot);
    var cx = dx * cos + dz * sin;   // camera-space x (right)
    var cz = -dx * sin + dz * cos;  // camera-space z (forward into screen)
    var cy = dy;                      // camera-space y (up)
    
    // Behind camera
    if (cz < NEAR) return null;
    if (cz > FAR) return null;
    
    // Perspective divide
    var f = (W * 0.5) / Math.tan(FOV / 2);
    var sx = W / 2 + (cx / cz) * f;
    var sy = H / 2 - (cy / cz) * f;
    
    return { x: sx, y: sy, z: cz };
}

// Clip and draw a 3D line segment
function drawLine3D(x1, y1, z1, x2, y2, z2) {
    // Compute camera-space Z for each point
    var cos = Math.cos(cam.rot);
    var sin = Math.sin(cam.rot);
    var p1z = -(x1 - cam.x) * sin + (z1 - cam.z) * cos;
    var p2z = -(x2 - cam.x) * sin + (z2 - cam.z) * cos;
    
    if (p1z < NEAR && p2z < NEAR) return;
    
    // If one point is behind, clip
    if (p1z < NEAR || p2z < NEAR) {
        var t = (NEAR - p1z) / (p2z - p1z);
        if (p1z < NEAR) {
            x1 = x1 + (x2 - x1) * t;
            y1 = y1 + (y2 - y1) * t;
            z1 = z1 + (z2 - z1) * t;
        } else {
            t = (NEAR - p2z) / (p1z - p2z);
            x2 = x2 + (x1 - x2) * t;
            y2 = y2 + (y1 - y2) * t;
            z2 = z2 + (z1 - z2) * t;
        }
    }
    
    var a = projectPoint(x1, y1, z1);
    var b = projectPoint(x2, y2, z2);
    if (!a || !b) return;
    
    gl.beginPath();
    gl.moveTo(a.x, a.y);
    gl.lineTo(b.x, b.y);
    gl.stroke();
}

// ============================================================
// WORLD OBJECTS
// ============================================================
var obstacles = [];
var enemies = [];
var explosions = [];
var enemyShells = [];
var spawnTimer = 0;

function generateWorld() {
    obstacles = [];
    // Scatter pyramids and cubes
    for (var i = 0; i < 20; i++) {
        var ox = (Math.random() - 0.5) * 2000;
        var oz = (Math.random() - 0.5) * 2000;
        if (Math.abs(ox) < 60 && Math.abs(oz) < 60) continue;
        obstacles.push({
            x: ox, z: oz,
            size: 15 + Math.random() * 15,
            type: Math.random() < 0.6 ? 'pyramid' : 'cube'
        });
    }
}

function spawnEnemy() {
    var angle = Math.random() * Math.PI * 2;
    var dist = 400 + Math.random() * 300;
    enemies.push({
        x: cam.x + Math.cos(angle) * dist,
        z: cam.z + Math.sin(angle) * dist,
        rot: Math.random() * Math.PI * 2,
        speed: 1.2 + level * 0.3,
        hp: 1,
        fireTimer: 100 + Math.floor(Math.random() * 100),
        state: 'approach' // approach, strafe
    });
}

// ============================================================
// DRAWING FUNCTIONS
// ============================================================

function drawGroundGrid() {
    // Solid ground
    var grad = gl.createLinearGradient(0, H*0.42, 0, H);
    grad.addColorStop(0, '#3a5a20');
    grad.addColorStop(1, '#1a3010');
    gl.fillStyle = grad;
    gl.fillRect(0, H*0.42, W, H*0.58);
    
    // Faint grid lines
    gl.strokeStyle = 'rgba(80,120,40,0.25)';
    gl.lineWidth = 1;
    var gridSpace = 100, extent = 600;
    var baseX = Math.round(cam.x / gridSpace) * gridSpace;
    var baseZ = Math.round(cam.z / gridSpace) * gridSpace;
    for (var i = -extent; i <= extent; i += gridSpace) {
        var a = projectPoint(baseX + i, 0, baseZ - extent);
        var b = projectPoint(baseX + i, 0, baseZ + extent);
        if (a && b) { gl.beginPath(); gl.moveTo(a.x,a.y); gl.lineTo(b.x,b.y); gl.stroke(); }
        a = projectPoint(baseX - extent, 0, baseZ + i);
        b = projectPoint(baseX + extent, 0, baseZ + i);
        if (a && b) { gl.beginPath(); gl.moveTo(a.x,a.y); gl.lineTo(b.x,b.y); gl.stroke(); }
    }
}

function drawMountainRange() {
    var dist = 900, segments = 80;
    gl.beginPath();
    gl.moveTo(0, H*0.42);
    for (var i = 0; i <= segments; i++) {
        var angle = (i / segments) * Math.PI * 2;
        var wx = cam.x + Math.cos(angle) * dist;
        var wz = cam.z + Math.sin(angle) * dist;
        var seed = Math.floor(angle * 20);
        var mh = 30 + Math.abs(Math.sin(seed * 3.7) * 60) + Math.abs(Math.cos(seed * 2.3) * 30);
        var p = projectPoint(wx, mh, wz);
        if (p) gl.lineTo(p.x, p.y);
    }
    gl.lineTo(W, H*0.42);
    gl.closePath();
    gl.fillStyle = '#1a3a1a';
    gl.fill();
}

function drawObstacle(ob) {
    var s = ob.size, x = ob.x, z = ob.z;
    
    if (ob.type === 'pyramid') {
        var apex = s * 2;
        var faces = [
            [{x:x-s,y:0,z:z-s},{x:x+s,y:0,z:z-s},{x:x,y:apex,z:z}],
            [{x:x+s,y:0,z:z-s},{x:x+s,y:0,z:z+s},{x:x,y:apex,z:z}],
            [{x:x+s,y:0,z:z+s},{x:x-s,y:0,z:z+s},{x:x,y:apex,z:z}],
            [{x:x-s,y:0,z:z+s},{x:x-s,y:0,z:z-s},{x:x,y:apex,z:z}]
        ];
        var colors = ['#8B4513','#A0522D','#7A3B10','#6B3410'];
        for (var i = 0; i < 4; i++) {
            var pts = [];
            var behind = false;
            for (var j = 0; j < faces[i].length; j++) {
                var p = projectPoint(faces[i][j].x, faces[i][j].y, faces[i][j].z);
                if (!p) { behind = true; break; }
                pts.push(p);
            }
            if (!behind && pts.length === 3) {
                gl.fillStyle = colors[i];
                gl.beginPath(); gl.moveTo(pts[0].x,pts[0].y); gl.lineTo(pts[1].x,pts[1].y); gl.lineTo(pts[2].x,pts[2].y); gl.closePath(); gl.fill();
                gl.strokeStyle = '#3a2005'; gl.lineWidth = 1; gl.stroke();
            }
        }
    } else {
        var h = s * 1.5;
        var b = [{x:x-s,y:0,z:z-s},{x:x+s,y:0,z:z-s},{x:x+s,y:0,z:z+s},{x:x-s,y:0,z:z+s}];
        var t = [{x:x-s,y:h,z:z-s},{x:x+s,y:h,z:z-s},{x:x+s,y:h,z:z+s},{x:x-s,y:h,z:z+s}];
        var faces = [
            [t[0],t[1],t[2],t[3]],
            [b[0],b[1],t[1],t[0]],
            [b[1],b[2],t[2],t[1]],
            [b[2],b[3],t[3],t[2]],
            [b[3],b[0],t[0],t[3]]
        ];
        var colors = ['#556B2F','#4A5A28','#3D4D22','#4A5A28','#556B2F'];
        for (var i = 0; i < 5; i++) {
            var pts = [];
            var behind = false;
            for (var j = 0; j < faces[i].length; j++) {
                var p = projectPoint(faces[i][j].x, faces[i][j].y, faces[i][j].z);
                if (!p) { behind = true; break; }
                pts.push(p);
            }
            if (!behind && pts.length >= 3) {
                gl.fillStyle = colors[i];
                gl.beginPath(); gl.moveTo(pts[0].x,pts[0].y);
                for (var j = 1; j < pts.length; j++) gl.lineTo(pts[j].x,pts[j].y);
                gl.closePath(); gl.fill();
                gl.strokeStyle = '#2a3615'; gl.lineWidth = 1; gl.stroke();
            }
        }
    }
}

function drawEnemyTank(e) {
    var x = e.x, z = e.z, rot = e.rot;
    var cos = Math.cos(rot), sin = Math.sin(rot);
    var bw = 10, bl = 14, bh = 6;
    
    var bb = [
        {x:x+cos*bl-sin*bw, y:2, z:z+sin*bl+cos*bw},
        {x:x+cos*bl+sin*bw, y:2, z:z+sin*bl-cos*bw},
        {x:x-cos*bl+sin*bw, y:2, z:z-sin*bl-cos*bw},
        {x:x-cos*bl-sin*bw, y:2, z:z-sin*bl+cos*bw}
    ];
    var bt = [{x:bb[0].x,y:bh+2,z:bb[0].z},{x:bb[1].x,y:bh+2,z:bb[1].z},{x:bb[2].x,y:bh+2,z:bb[2].z},{x:bb[3].x,y:bh+2,z:bb[3].z}];
    
    var bodyFaces = [
        [bt[0],bt[1],bt[2],bt[3]], // top
        [bb[0],bb[1],bt[1],bt[0]], // sides
        [bb[1],bb[2],bt[2],bt[1]],
        [bb[2],bb[3],bt[3],bt[2]],
        [bb[3],bb[0],bt[0],bt[3]]
    ];
    var bodyColors = ['#8B0000','#AA0000','#770000','#AA0000','#770000'];
    
    for (var i = 0; i < 5; i++) {
        var pts = [], ok = true;
        for (var j = 0; j < bodyFaces[i].length; j++) {
            var p = projectPoint(bodyFaces[i][j].x, bodyFaces[i][j].y, bodyFaces[i][j].z);
            if (!p) { ok = false; break; }
            pts.push(p);
        }
        if (ok) {
            gl.fillStyle = bodyColors[i];
            gl.beginPath(); gl.moveTo(pts[0].x,pts[0].y);
            for (var j=1;j<pts.length;j++) gl.lineTo(pts[j].x,pts[j].y);
            gl.closePath(); gl.fill();
            gl.strokeStyle = '#400000'; gl.lineWidth = 1; gl.stroke();
        }
    }
    
    // Turret
    var tw=5,tl=6,th=4;
    var tb=[{x:x+cos*tl-sin*tw,y:bh+2,z:z+sin*tl+cos*tw},{x:x+cos*tl+sin*tw,y:bh+2,z:z+sin*tl-cos*tw},{x:x-cos*tl+sin*tw,y:bh+2,z:z-sin*tl-cos*tw},{x:x-cos*tl-sin*tw,y:bh+2,z:z-sin*tl+cos*tw}];
    var tt=[{x:tb[0].x,y:bh+th+2,z:tb[0].z},{x:tb[1].x,y:bh+th+2,z:tb[1].z},{x:tb[2].x,y:bh+th+2,z:tb[2].z},{x:tb[3].x,y:bh+th+2,z:tb[3].z}];
    var tFaces=[[tt[0],tt[1],tt[2],tt[3]],[tb[0],tb[1],tt[1],tt[0]],[tb[1],tb[2],tt[2],tt[1]],[tb[2],tb[3],tt[3],tt[2]],[tb[3],tb[0],tt[0],tt[3]]];
    var tColors=['#CC0000','#BB0000','#990000','#BB0000','#990000'];
    for(var i=0;i<5;i++){
        var pts=[],ok=true;
        for(var j=0;j<tFaces[i].length;j++){var p=projectPoint(tFaces[i][j].x,tFaces[i][j].y,tFaces[i][j].z);if(!p){ok=false;break;}pts.push(p);}
        if(ok){gl.fillStyle=tColors[i];gl.beginPath();gl.moveTo(pts[0].x,pts[0].y);for(var j=1;j<pts.length;j++)gl.lineTo(pts[j].x,pts[j].y);gl.closePath();gl.fill();gl.strokeStyle='#500000';gl.lineWidth=1;gl.stroke();}
    }
    
    // Barrel
    var bLen=25,bW=2;
    var bx1=x+cos*tl,bz1=z+sin*tl,bx2=x+cos*bLen,bz2=z+sin*bLen;
    var px1=-sin*bW,pz1=cos*bW;
    var barrelFace=[{x:bx1+px1,y:bh+th,z:bz1+pz1},{x:bx1-px1,y:bh+th,z:bz1-pz1},{x:bx2-px1,y:bh+th+1,z:bz2-pz1},{x:bx2+px1,y:bh+th+1,z:bz2+pz1}];
    var pts=[],ok=true;
    for(var j=0;j<4;j++){var p=projectPoint(barrelFace[j].x,barrelFace[j].y,barrelFace[j].z);if(!p){ok=false;break;}pts.push(p);}
    if(ok){gl.fillStyle='#DD2222';gl.beginPath();gl.moveTo(pts[0].x,pts[0].y);for(var j=1;j<4;j++)gl.lineTo(pts[j].x,pts[j].y);gl.closePath();gl.fill();}
}

function drawShell(s) {
    var p = projectPoint(s.x, s.y, s.z);
    if (!p) return;
    var col = s.friendly ? '#ffff00' : '#ff4400';
    var r = Math.max(4, 400 / p.z);
    gl.fillStyle = col;
    gl.shadowColor = col;
    gl.shadowBlur = 15;
    gl.beginPath(); gl.arc(p.x, p.y, r, 0, Math.PI*2); gl.fill();
    var tx = s.x - s.dx*3, tz = s.z - s.dz*3;
    var p2 = projectPoint(tx, s.y, tz);
    if (p2) { gl.strokeStyle = col; gl.lineWidth = Math.max(2,200/p.z); gl.beginPath(); gl.moveTo(p2.x,p2.y); gl.lineTo(p.x,p.y); gl.stroke(); }
    gl.shadowBlur = 0;
}

function drawExplosion(ex) {
    var p = projectPoint(ex.x, 8, ex.z);
    if (!p) return;
    var r = Math.max(8, ex.radius * 300 / p.z);
    var alpha = 1 - ex.t / 20;
    var grad = gl.createRadialGradient(p.x, p.y, 0, p.x, p.y, r);
    grad.addColorStop(0, 'rgba(255,255,100,' + alpha + ')');
    grad.addColorStop(0.4, 'rgba(255,150,0,' + alpha*0.8 + ')');
    grad.addColorStop(1, 'rgba(200,0,0,0)');
    gl.fillStyle = grad;
    gl.beginPath(); gl.arc(p.x, p.y, r, 0, Math.PI*2); gl.fill();
}

function drawCrosshair() {
    var cx = W/2, cy = H/2;
    gl.strokeStyle = 'rgba(255,255,255,0.8)';
    gl.lineWidth = 2;
    gl.beginPath();
    gl.moveTo(cx - 30, cy); gl.lineTo(cx - 10, cy);
    gl.moveTo(cx + 10, cy); gl.lineTo(cx + 30, cy);
    gl.moveTo(cx, cy - 30); gl.lineTo(cx, cy - 10);
    gl.moveTo(cx, cy + 10); gl.lineTo(cx, cy + 30);
    gl.stroke();
    gl.fillStyle = '#fff';
    gl.beginPath(); gl.arc(cx, cy, 2, 0, Math.PI*2); gl.fill();
}

function drawHUD() {
    gl.fillStyle = '#fff';
    gl.font = 'bold 20px Courier New';
    gl.textAlign = 'left';
    gl.fillText('SCORE: ' + score, 20, 35);
    gl.fillText('LIVES: ' + lives, 20, 62);
    gl.textAlign = 'right';
    gl.fillText('LEVEL: ' + level, W - 20, 35);
    
    // Radar
    var rx = W - 80, ry = H - 80, rs = 55;
    gl.fillStyle = 'rgba(0,20,0,0.7)';
    gl.beginPath(); gl.arc(rx, ry, rs, 0, Math.PI*2); gl.fill();
    gl.strokeStyle = 'rgba(0,255,0,0.5)';
    gl.lineWidth = 1;
    gl.beginPath(); gl.arc(rx, ry, rs, 0, Math.PI*2); gl.stroke();
    gl.fillStyle = '#0f0';
    gl.fillRect(rx-2, ry-2, 4, 4);
    gl.strokeStyle = '#0f0'; gl.lineWidth = 2;
    gl.beginPath(); gl.moveTo(rx, ry);
    gl.lineTo(rx - Math.sin(cam.rot)*12, ry - Math.cos(cam.rot)*12); gl.stroke();
    for (var i = 0; i < enemies.length; i++) {
        var dx = enemies[i].x - cam.x, dz = enemies[i].z - cam.z;
        var d = Math.sqrt(dx*dx + dz*dz);
        if (d > 600) continue;
        gl.fillStyle = '#f00';
        gl.fillRect(rx + (dx/600)*rs - 2, ry + (dz/600)*rs - 2, 4, 4);
    }
    
    gl.fillStyle = 'rgba(255,255,255,0.5)';
    gl.font = '14px Courier New';
    gl.textAlign = 'center';
    gl.fillText('W/S: Move  A/D: Turn  SPACE: Fire', W/2, H - 15);
}

// ============================================================
// GAME LOGIC
// ============================================================

function firePlayerShell() {
    if (shellInFlight) return; // one at a time like the original
    // Forward direction: derived from projection math
    // In projectPoint, cz = -dx*sin(rot) + dz*cos(rot), so forward is (-sin(rot), cos(rot))
    var fdx = -Math.sin(cam.rot) * shellSpeed;
    var fdz = Math.cos(cam.rot) * shellSpeed;
    shellInFlight = {
        x: cam.x + fdx * 3,
        y: camY,
        z: cam.z + fdz * 3,
        dx: fdx, dz: fdz,
        life: 100,
        friendly: true
    };
    bangTimer = 20;
}

function update() {
    if (!alive) return;
    
    // Player movement
    var accel = 0;
    if (input.fwd) accel = 0.15;
    if (input.back) accel = -0.1;
    speed += accel;
    speed *= 0.92; // friction
    if (Math.abs(speed) < 0.01) speed = 0;
    
    if (input.left) cam.rot += 0.03;
    if (input.right) cam.rot -= 0.03;
    
    var nx = cam.x - Math.sin(cam.rot) * speed;
    var nz = cam.z + Math.cos(cam.rot) * speed;
    
    // Collision with obstacles
    var blocked = false;
    for (var i = 0; i < obstacles.length; i++) {
        var dx = nx - obstacles[i].x;
        var dz = nz - obstacles[i].z;
        if (Math.sqrt(dx*dx + dz*dz) < obstacles[i].size + 8) {
            blocked = true; speed = 0; break;
        }
    }
    if (!blocked) { cam.x = nx; cam.z = nz; }
    
    // Clamp to world bounds
    cam.x = Math.max(-950, Math.min(950, cam.x));
    cam.z = Math.max(-950, Math.min(950, cam.z));
    
    // Fire
    if (input.fire) {
        firePlayerShell();
        input.fire = false;
    }
    
    // Update player shell
    if (shellInFlight) {
        var s = shellInFlight;
        var prevX = s.x;
        var prevZ = s.z;
        s.x += s.dx;
        s.z += s.dz;
        s.life--;
        
        if (s.life <= 0) {
            shellInFlight = null;
        } else {
            // Swept collision - check along the path from prev to current
            for (var i = enemies.length - 1; i >= 0; i--) {
                // Point-to-segment distance
                var ex = enemies[i].x, ez = enemies[i].z;
                var segX = s.x - prevX, segZ = s.z - prevZ;
                var segLen = Math.sqrt(segX*segX + segZ*segZ);
                var toEX = ex - prevX, toEZ = ez - prevZ;
                var t = (toEX*segX + toEZ*segZ) / (segLen*segLen);
                t = Math.max(0, Math.min(1, t));
                var closestX = prevX + segX * t;
                var closestZ = prevZ + segZ * t;
                var hitDx = ex - closestX, hitDz = ez - closestZ;
                var hitDist = hitDx*hitDx + hitDz*hitDz;
                
                if (hitDist < 30*30) {
                    // Hit!
                    explosions.push({ x: enemies[i].x, z: enemies[i].z, t: 0, radius: 20 });
                    enemies.splice(i, 1);
                    shellInFlight = null;
                    score += 100 * level;
                    kills++;
                    level = Math.floor(kills / 5) + 1;
                    break;
                }
            }
        }
    }
    
    // Update enemy shells
    for (var i = enemyShells.length - 1; i >= 0; i--) {
        var s = enemyShells[i];
        s.x += s.dx;
        s.z += s.dz;
        s.life--;
        if (s.life <= 0) { enemyShells.splice(i, 1); continue; }
        
        // Hit player?
        var dx = s.x - cam.x;
        var dz = s.z - cam.z;
        if (dx*dx + dz*dz < 8*8) {
            enemyShells.splice(i, 1);
            lives--;
            explosions.push({ x: cam.x, z: cam.z, t: 0, radius: 15 });
            if (lives <= 0) {
                alive = false;
            }
        }
    }
    
    // Update enemies
    for (var i = 0; i < enemies.length; i++) {
        var e = enemies[i];
        var dx = cam.x - e.x;
        var dz = cam.z - e.z;
        var dist = Math.sqrt(dx*dx + dz*dz);
        var angleToPlayer = Math.atan2(dx, dz);
        
        // State machine AI
        if (!e.state) e.state = 'approach';
        if (!e.stateTimer) e.stateTimer = 0;
        e.stateTimer--;
        
        switch(e.state) {
            case 'approach':
                // Drive toward player until in firing range
                var diff = angleToPlayer - e.rot;
                while (diff > Math.PI) diff -= Math.PI*2;
                while (diff < -Math.PI) diff += Math.PI*2;
                e.rot += Math.sign(diff) * Math.min(Math.abs(diff), 0.025);
                e.x += Math.sin(e.rot) * e.speed;
                e.z += Math.cos(e.rot) * e.speed;
                
                if (dist < 250) {
                    e.state = 'aim';
                    e.stateTimer = 90 + Math.floor(Math.random() * 60);
                }
                break;
                
            case 'aim':
                // Stop and turn to face player, then fire
                var diff = angleToPlayer - e.rot;
                while (diff > Math.PI) diff -= Math.PI*2;
                while (diff < -Math.PI) diff += Math.PI*2;
                e.rot += Math.sign(diff) * Math.min(Math.abs(diff), 0.03);
                
                if (e.stateTimer <= 0) {
                    // Fire!
                    var inaccuracy = 0.3 + Math.random() * 0.2;
                    var shellAngle = e.rot + (Math.random() - 0.5) * inaccuracy;
                    var shellDx = Math.sin(shellAngle) * 5;
                    var shellDz = Math.cos(shellAngle) * 5;
                    enemyShells.push({
                        x: e.x + shellDx*3, y: 8, z: e.z + shellDz*3,
                        dx: shellDx, dz: shellDz,
                        life: 40, friendly: false
                    });
                    // After firing, decide next action
                    var r = Math.random();
                    if (r < 0.4) {
                        e.state = 'strafe';
                        e.strafeDir = Math.random() < 0.5 ? 1 : -1;
                        e.stateTimer = 60 + Math.floor(Math.random() * 50);
                    } else if (r < 0.7) {
                        e.state = 'retreat';
                        e.stateTimer = 40 + Math.floor(Math.random() * 30);
                    } else {
                        e.state = 'aim';
                        e.stateTimer = 80 + Math.floor(Math.random() * 50);
                    }
                }
                break;
                
            case 'strafe':
                // Move perpendicular to player to dodge
                var perpAngle = angleToPlayer + (Math.PI/2) * e.strafeDir;
                var diff = perpAngle - e.rot;
                while (diff > Math.PI) diff -= Math.PI*2;
                while (diff < -Math.PI) diff += Math.PI*2;
                e.rot += Math.sign(diff) * Math.min(Math.abs(diff), 0.03);
                e.x += Math.sin(e.rot) * e.speed * 0.8;
                e.z += Math.cos(e.rot) * e.speed * 0.8;
                
                if (e.stateTimer <= 0) {
                    e.state = 'aim';
                    e.stateTimer = 30 + Math.floor(Math.random() * 20);
                }
                break;
                
            case 'retreat':
                // Back away from player
                var awayAngle = angleToPlayer + Math.PI;
                var diff = awayAngle - e.rot;
                while (diff > Math.PI) diff -= Math.PI*2;
                while (diff < -Math.PI) diff += Math.PI*2;
                e.rot += Math.sign(diff) * Math.min(Math.abs(diff), 0.02);
                e.x += Math.sin(e.rot) * e.speed * 0.6;
                e.z += Math.cos(e.rot) * e.speed * 0.6;
                
                if (e.stateTimer <= 0 || dist > 350) {
                    e.state = 'approach';
                    e.stateTimer = 0;
                }
                break;
        }
        
        // If too far away, always approach
        if (dist > 400 && e.state !== 'approach') {
            e.state = 'approach';
        }
    }
    
    // Update explosions
    for (var i = explosions.length - 1; i >= 0; i--) {
        explosions[i].t++;
        explosions[i].radius += 2;
        if (explosions[i].t > 20) explosions.splice(i, 1);
    }
    
    // Spawn enemies
    spawnTimer--;
    if (spawnTimer <= 0 && enemies.length < Math.min(2 + level, 6)) {
        spawnEnemy();
        spawnTimer = Math.max(100, 300 - level * 30);
    }
}

// ============================================================
// RENDER
// ============================================================
function render() {
    // Sky
    var skyGrad = gl.createLinearGradient(0, 0, 0, H*0.42);
    skyGrad.addColorStop(0, '#000820');
    skyGrad.addColorStop(1, '#1a3050');
    gl.fillStyle = skyGrad;
    gl.fillRect(0, 0, W, H);
    
    drawMountainRange();
    drawGroundGrid();
    
    for (var i = 0; i < obstacles.length; i++) drawObstacle(obstacles[i]);
    for (var i = 0; i < enemies.length; i++) drawEnemyTank(enemies[i]);
    
    if (shellInFlight) drawShell(shellInFlight);
    for (var i = 0; i < enemyShells.length; i++) drawShell(enemyShells[i]);
    for (var i = 0; i < explosions.length; i++) drawExplosion(explosions[i]);
    
    drawCrosshair();
    drawHUD();
    
    if (bangTimer > 0) {
        var alpha = bangTimer / 20;
        gl.fillStyle = 'rgba(255,255,0,' + alpha + ')';
        gl.font = 'bold 36px Courier New';
        gl.textAlign = 'center';
        gl.fillText('BANG!', W/2, H/2 + 80);
        bangTimer--;
    }
    
    if (shellInFlight) {
        gl.fillStyle = '#ff0';
        gl.font = '14px Courier New';
        gl.textAlign = 'left';
        gl.fillText('>>> SHELL >>>', 20, H - 40);
    }
    
    if (!alive) {
        gl.fillStyle = 'rgba(0,0,0,0.7)';
        gl.fillRect(0, 0, W, H);
        gl.fillStyle = '#f00';
        gl.font = 'bold 60px Courier New';
        gl.textAlign = 'center';
        gl.fillText('DESTROYED', W/2, H/2 - 30);
        gl.fillStyle = '#fff';
        gl.font = '28px Courier New';
        gl.fillText('Score: ' + score + '   Kills: ' + kills, W/2, H/2 + 20);
        gl.font = '20px Courier New';
        gl.fillText('Press R to restart', W/2, H/2 + 60);
    }
}

// ============================================================
// GAME LOOP
// ============================================================
function frame() {
    update();
    render();
    requestAnimationFrame(frame);
}

function startGame() {
    cam.x = 0; cam.z = 0; cam.rot = 0;
    speed = 0;
    alive = true;
    score = 0; kills = 0; lives = 5; level = 1;
    shellInFlight = null;
    enemies = [];
    enemyShells = [];
    explosions = [];
    spawnTimer = 60;
    generateWorld();
}

// Restart on R
document.addEventListener('keydown', function(e) {
    if (e.code === 'KeyR' && !alive) {
        startGame();
    }
});

startGame();
frame();
</script>
