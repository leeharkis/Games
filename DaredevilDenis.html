<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daredevil Denis</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; font-family: monospace; }
canvas { display: block; border: 2px solid #fff; image-rendering: pixelated; }
.info { color: #ff0; font-size: 14px; margin-top: 10px; text-align: center; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="info">D/→: Accelerate | A/←: Brake | SPACE: Jump</div>
<script>
var c = document.getElementById('c');
var ctx = c.getContext('2d');
c.width = 800;
c.height = 500;
var W = c.width, H = c.height;

// Layout: 4 platforms, no scrolling, Denis wraps to next row at screen edge
var HUD_H = 28;
var PLAT_AREA = H - HUD_H - 20;
var NUM_PLATFORMS = 4;
var PLAT_SPACING = PLAT_AREA / NUM_PLATFORMS;
var PLATFORM_H = 10;
var platforms = [];
for (var i = 0; i < NUM_PLATFORMS; i++) {
    platforms.push(HUD_H + (i + 1) * PLAT_SPACING - 15);
}

var GRAVITY = 0.5;
var JUMP_FORCE = -12;
var MAX_SPEED = 6;
var ACCEL = 0.12;
var BRAKE = 0.08;
var FRICTION = 0.02;

var denis, hazards, collectibles, score, lives, level, gameOver, gameWon;
var helicopter;
var frameCount = 0;
var input = { left: false, right: false, jump: false };

document.addEventListener('keydown', function(e) {
    if (e.code === 'KeyA' || e.code === 'ArrowLeft') input.left = true;
    if (e.code === 'KeyD' || e.code === 'ArrowRight') input.right = true;
    if (e.code === 'Space') { e.preventDefault(); input.jump = true; }
    if (e.code === 'KeyR' && gameOver) startGame();
});
document.addEventListener('keyup', function(e) {
    if (e.code === 'KeyA' || e.code === 'ArrowLeft') input.left = false;
    if (e.code === 'KeyD' || e.code === 'ArrowRight') input.right = false;
    if (e.code === 'Space') input.jump = false;
});

function startGame() {
    score = 0;
    lives = 9;
    level = 1;
    gameOver = false;
    gameWon = false;
    startLevel();
}

function startLevel() {
    denis = {
        x: 30,
        y: platforms[0] - 28,
        vx: 0,
        vy: 0,
        w: 40,
        h: 28,
        onGround: true,
        platform: 0,
        wheelAnim: 0,
        invincible: 0
    };
    generateLevel();
}

function generateLevel() {
    hazards = [];
    collectibles = [];
    
    var numPerRow = Math.max(1, Math.floor(level * 0.3));
    
    for (var row = 0; row < NUM_PLATFORMS; row++) {
        var py = platforms[row];
        
        // Place hazards on each platform
        for (var h = 0; h < numPerRow; h++) {
            var hx = 100 + Math.random() * (W - 200);
            var type = Math.random();
            var hazard;
            
            if (type < 0.25) {
                hazard = { x: hx, y: py - 35, w: 20, h: 35, type: 'tree', platform: row };
            } else if (type < 0.5) {
                hazard = { x: hx, y: py - 30, w: 35, h: 30, type: 'house', platform: row };
            } else if (type < 0.75) {
                hazard = { x: hx, y: py - 22, w: 45, h: 22, type: 'ambulance', platform: row,
                    vx: (0.5 + Math.random() * 0.5) * (Math.random() < 0.5 ? 1 : -1), startX: hx };
            } else {
                hazard = { x: hx, y: py - 45, w: 20, h: 20, type: 'spider', platform: row,
                    baseY: py - 45, phase: Math.random() * Math.PI * 2 };
            }
            hazards.push(hazard);
        }
        
        // Collectibles (1-2 per row)
        var numCol = 1 + Math.floor(Math.random() * 2);
        for (var j = 0; j < numCol; j++) {
            collectibles.push({
                x: 80 + Math.random() * (W - 160),
                y: py - 30,
                w: 16, h: 20,
                collected: false,
                platform: row,
                bobPhase: Math.random() * Math.PI * 2
            });
        }
    }
    
    helicopter = { x: -60, y: HUD_H + 15, vx: 1 + level * 0.1, w: 60, h: 15 };
}

function update() {
    if (gameOver) return;
    frameCount++;
    
    // Movement
    if (input.right) {
        denis.vx = Math.min(denis.vx + ACCEL, MAX_SPEED);
    } else if (input.left) {
        denis.vx = Math.max(denis.vx - BRAKE, -1);
    } else {
        if (denis.vx > 0) denis.vx = Math.max(0, denis.vx - FRICTION);
    }
    
    // Jump
    if (input.jump && denis.onGround) {
        denis.vy = JUMP_FORCE;
        denis.onGround = false;
    }
    
    // Gravity
    if (!denis.onGround) {
        denis.vy += GRAVITY;
    }
    
    denis.x += denis.vx;
    denis.y += denis.vy;
    
    // Wrap to next platform when hitting right edge
    if (denis.x + denis.w > W) {
        if (denis.platform < NUM_PLATFORMS - 1) {
            // Move to next row - land on it cleanly
            denis.platform++;
            denis.x = 0;
            denis.y = platforms[denis.platform] - denis.h;
            denis.vy = 0;
            denis.vx = Math.max(denis.vx * 0.5, 0);
            denis.onGround = true;
            input.jump = false; // consume jump so it doesn't re-trigger
        } else {
            // Reached right side of 4th row - level complete!
            score += 500 * level;
            level++;
            if (level > 10) {
                gameWon = true;
                gameOver = true;
            } else {
                startLevel();
            }
            return;
        }
    }
    
    // Don't go off left
    if (denis.x < 0) { denis.x = 0; denis.vx = 0; }
    
    // Platform collision (land on current platform)
    denis.onGround = false;
    var py = platforms[denis.platform];
    if (denis.vy >= 0 && denis.y + denis.h >= py && denis.y + denis.h <= py + 20) {
        denis.y = py - denis.h;
        denis.vy = 0;
        denis.onGround = true;
    }
    
    // Fall off bottom of current platform
    if (denis.y > py + 50) {
        // Land on platform below if there is one
        if (denis.platform < NUM_PLATFORMS - 1) {
            denis.platform++;
            denis.y = platforms[denis.platform] - denis.h;
            denis.vy = 0;
            denis.onGround = true;
        } else {
            loseLife();
            return;
        }
    }
    
    // Wheel animation
    denis.wheelAnim += Math.abs(denis.vx) * 0.3;
    if (denis.invincible > 0) denis.invincible--;
    
    // Update hazards
    for (var i = 0; i < hazards.length; i++) {
        var h = hazards[i];
        if (h.type === 'ambulance') {
            h.x += h.vx;
            if (h.x < 20 || h.x + h.w > W - 20) h.vx = -h.vx;
        } else if (h.type === 'spider') {
            h.phase += 0.05;
            h.y = h.baseY + Math.sin(h.phase) * 20;
        }
        
        // Only check collision on same platform - use shrunken hitbox
        if (h.platform === denis.platform && denis.invincible <= 0) {
            var shrunk = { x: h.x + 4, y: h.y + 4, w: h.w - 8, h: h.h - 8 };
            if (rectsOverlap(denis, shrunk)) {
                loseLife();
                return;
            }
        }
    }
    
    // Helicopter
    helicopter.x += helicopter.vx;
    if (helicopter.x > W + 80) helicopter.x = -80;
    
    if (denis.invincible <= 0) {
        var hRect = { x: helicopter.x, y: helicopter.y, w: helicopter.w, h: helicopter.h };
        if (rectsOverlap(denis, hRect)) {
            loseLife();
            return;
        }
    }
    
    // Collectibles
    for (var i = 0; i < collectibles.length; i++) {
        var col = collectibles[i];
        if (col.collected) continue;
        col.bobPhase += 0.04;
        if (col.platform === denis.platform && rectsOverlap(denis, col)) {
            col.collected = true;
            score += 100 * level;
        }
    }
}

function rectsOverlap(a, b) {
    return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
}

function loseLife() {
    lives--;
    if (lives <= 0) {
        gameOver = true;
    } else {
        denis.x = 30;
        denis.y = platforms[0] - 28;
        denis.vx = 0;
        denis.vy = 0;
        denis.onGround = true;
        denis.platform = 0;
        denis.invincible = 180;
    }
}

function render() {
    // Sky
    var skyGrad = ctx.createLinearGradient(0, HUD_H, 0, H);
    skyGrad.addColorStop(0, '#2040a0');
    skyGrad.addColorStop(1, '#60a0d0');
    ctx.fillStyle = skyGrad;
    ctx.fillRect(0, HUD_H, W, H - HUD_H);
    
    // Platforms
    for (var i = 0; i < NUM_PLATFORMS; i++) {
        var py = platforms[i];
        ctx.fillStyle = '#444';
        ctx.fillRect(0, py, W, PLATFORM_H);
        ctx.fillStyle = '#666';
        ctx.fillRect(0, py, W, 3);
        // Road markings
        ctx.fillStyle = '#ff0';
        for (var mx = 20; mx < W; mx += 60) {
            ctx.fillRect(mx, py + 4, 25, 3);
        }
        // Row number
        ctx.fillStyle = 'rgba(255,255,255,0.3)';
        ctx.font = '12px monospace';
        ctx.textAlign = 'left';
        ctx.fillText('ROW ' + (i + 1), 5, py - 3);
    }
    
    // Collectibles
    for (var i = 0; i < collectibles.length; i++) {
        var col = collectibles[i];
        if (col.collected) continue;
        var bobY = col.y + Math.sin(col.bobPhase) * 3;
        ctx.fillStyle = '#f00';
        ctx.beginPath();
        ctx.arc(col.x + 8, bobY - 8, 7, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(col.x + 8, bobY - 1);
        ctx.lineTo(col.x + 8, bobY + 5);
        ctx.stroke();
        ctx.fillStyle = '#ffd700';
        drawStar(col.x + 8, bobY + 10, 6, 5, 0.5);
    }
    
    // Hazards
    for (var i = 0; i < hazards.length; i++) {
        drawHazard(hazards[i]);
    }
    
    // Denis
    if (denis.invincible <= 0 || (frameCount % 4 < 2)) {
        drawDenis();
    }
    
    // Helicopter
    drawHelicopter();
    
    // HUD
    ctx.fillStyle = '#111';
    ctx.fillRect(0, 0, W, HUD_H);
    ctx.fillStyle = '#ff0';
    ctx.font = 'bold 16px monospace';
    ctx.textAlign = 'left';
    ctx.fillText('SCORE: ' + score, 10, 19);
    ctx.textAlign = 'center';
    ctx.fillText('LIVES: ' + lives + '  LEVEL: ' + level, W / 2, 19);
    ctx.textAlign = 'right';
    // Show stars collected
    var total = collectibles.length;
    var got = 0;
    for (var i = 0; i < collectibles.length; i++) if (collectibles[i].collected) got++;
    ctx.fillText('STARS: ' + got + '/' + total, W - 10, 19);
    
    // Game over
    if (gameOver) {
        ctx.fillStyle = 'rgba(0,0,0,0.75)';
        ctx.fillRect(0, 0, W, H);
        ctx.fillStyle = gameWon ? '#ffd700' : '#f00';
        ctx.font = 'bold 48px monospace';
        ctx.textAlign = 'center';
        ctx.fillText(gameWon ? 'YOU WIN!' : 'GAME OVER', W / 2, H / 2 - 20);
        ctx.fillStyle = '#fff';
        ctx.font = '24px monospace';
        ctx.fillText('Score: ' + score, W / 2, H / 2 + 20);
        ctx.font = '18px monospace';
        ctx.fillText('Press R to restart', W / 2, H / 2 + 55);
    }
}

function drawDenis() {
    var x = denis.x, y = denis.y;
    ctx.fillStyle = '#c00';
    ctx.fillRect(x + 8, y + 8, 24, 10);
    ctx.fillStyle = '#333';
    ctx.fillRect(x + 12, y + 4, 10, 6);
    ctx.fillStyle = '#ffd700';
    ctx.beginPath(); ctx.arc(x + 17, y - 2, 7, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#00c';
    ctx.fillRect(x + 13, y + 2, 9, 8);
    var wheelR = 6;
    ctx.fillStyle = '#222';
    ctx.beginPath(); ctx.arc(x + 10, y + 21, wheelR, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(x + 32, y + 21, wheelR, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = '#888'; ctx.lineWidth = 1;
    for (var s = 0; s < 4; s++) {
        var a = denis.wheelAnim + s * Math.PI / 2;
        ctx.beginPath(); ctx.moveTo(x+10,y+21); ctx.lineTo(x+10+Math.cos(a)*wheelR,y+21+Math.sin(a)*wheelR); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(x+32,y+21); ctx.lineTo(x+32+Math.cos(a)*wheelR,y+21+Math.sin(a)*wheelR); ctx.stroke();
    }
    if (Math.abs(denis.vx) > 1) {
        ctx.fillStyle = 'rgba(200,200,200,0.4)';
        ctx.beginPath(); ctx.arc(x - 2, y + 17 + Math.random()*4, 3+Math.random()*2, 0, Math.PI*2); ctx.fill();
    }
}

function drawHazard(h) {
    if (h.type === 'tree') {
        ctx.fillStyle = '#654321';
        ctx.fillRect(h.x + 7, h.y + 18, 6, 17);
        ctx.fillStyle = '#0a0';
        ctx.beginPath(); ctx.arc(h.x + 10, h.y + 12, 11, 0, Math.PI * 2); ctx.fill();
    } else if (h.type === 'house') {
        ctx.fillStyle = '#a52a2a';
        ctx.fillRect(h.x, h.y + 10, h.w, h.h - 10);
        ctx.fillStyle = '#555';
        ctx.beginPath(); ctx.moveTo(h.x-2, h.y+10); ctx.lineTo(h.x+h.w/2, h.y); ctx.lineTo(h.x+h.w+2, h.y+10); ctx.closePath(); ctx.fill();
        ctx.fillStyle = '#ff0';
        ctx.fillRect(h.x + 10, h.y + 15, 8, 8);
    } else if (h.type === 'ambulance') {
        ctx.fillStyle = '#fff';
        ctx.fillRect(h.x, h.y, h.w, h.h - 5);
        ctx.fillStyle = '#f00';
        ctx.fillRect(h.x + 16, h.y + 3, 10, 3);
        ctx.fillRect(h.x + 19, h.y + 1, 4, 7);
        ctx.fillStyle = '#222';
        ctx.beginPath(); ctx.arc(h.x + 10, h.y + h.h - 3, 4, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(h.x + 35, h.y + h.h - 3, 4, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = (frameCount % 20 < 10) ? '#f00' : '#00f';
        ctx.fillRect(h.x + 20, h.y - 4, 5, 4);
    } else if (h.type === 'spider') {
        ctx.fillStyle = '#111';
        ctx.beginPath(); ctx.arc(h.x + 10, h.y + 10, 7, 0, Math.PI * 2); ctx.fill();
        ctx.strokeStyle = '#333'; ctx.lineWidth = 1.5;
        for (var l = 0; l < 4; l++) {
            var lx = h.x + 10 + (l < 2 ? -7 : 7);
            ctx.beginPath(); ctx.moveTo(h.x+10, h.y+6+l*3); ctx.lineTo(lx, h.y+6+l*3); ctx.lineTo(lx+(l<2?-4:4), h.y+10+l*3); ctx.stroke();
        }
        ctx.fillStyle = '#f00';
        ctx.beginPath(); ctx.arc(h.x+7, h.y+8, 2, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(h.x+13, h.y+8, 2, 0, Math.PI*2); ctx.fill();
        ctx.strokeStyle = '#aaa'; ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(h.x+10, h.y); ctx.lineTo(h.x+10, h.y-25); ctx.stroke();
    }
}

function drawHelicopter() {
    var x = helicopter.x, y = helicopter.y;
    ctx.fillStyle = '#4a4';
    ctx.fillRect(x + 10, y + 6, 30, 13);
    ctx.fillStyle = '#8df';
    ctx.beginPath(); ctx.arc(x + 42, y + 12, 8, -Math.PI/2, Math.PI/2); ctx.fill();
    ctx.fillStyle = '#4a4';
    ctx.fillRect(x, y + 9, 12, 4);
    ctx.fillRect(x - 2, y + 3, 7, 10);
    ctx.strokeStyle = '#333'; ctx.lineWidth = 2;
    var rPhase = frameCount * 0.5;
    ctx.beginPath(); ctx.moveTo(x+12+Math.cos(rPhase)*25, y+4); ctx.lineTo(x+12-Math.cos(rPhase)*25, y+4); ctx.stroke();
    ctx.strokeStyle = '#333'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(x+15, y+20); ctx.lineTo(x+40, y+20); ctx.stroke();
}

function drawStar(cx, cy, r, pts, inner) {
    ctx.beginPath();
    for (var i = 0; i < pts * 2; i++) {
        var a = (i / (pts * 2)) * Math.PI * 2 - Math.PI / 2;
        var rad = (i % 2 === 0) ? r : r * inner;
        if (i === 0) ctx.moveTo(cx + Math.cos(a)*rad, cy + Math.sin(a)*rad);
        else ctx.lineTo(cx + Math.cos(a)*rad, cy + Math.sin(a)*rad);
    }
    ctx.closePath(); ctx.fill();
}

function gameLoop() {
    update();
    render();
    requestAnimationFrame(gameLoop);
}

startGame();
gameLoop();
</script>
</body>
</html>
