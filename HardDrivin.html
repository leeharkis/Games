<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hard Drivin'</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;font-family:'Courier New',monospace}
canvas{display:block;width:100vw;height:100vh}
</style>
</head>
<body>
<canvas id="cv"></canvas>
<script>
var cv = document.getElementById('cv'), ctx = cv.getContext('2d');
var W, H;
function resize() { W = cv.width = window.innerWidth; H = cv.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);

// ==========================
// TRACK
// ==========================
var SEG_LEN = 50;       // length of each segment in world units
var ROAD_W = 500;      // half-width of road
var segments = [];
var totalLength;

function addRoad(count, curve, y) {
    for (var i = 0; i < count; i++) {
        segments.push({ curve: curve, y: y });
    }
}

function buildTrack() {
    segments = [];
    addRoad(30, 0, 0);       // straight
    addRoad(20, 3, 0);       // right curve
    addRoad(15, 0, 0);       // straight
    addRoad(10, 0, 30);      // uphill
    addRoad(5, 0, -10);      // crest
    addRoad(10, 0, -30);     // downhill
    addRoad(20, -4, 0);      // left curve
    addRoad(10, 0, 0);       // straight
    addRoad(15, 2, 0);       // gentle right
    addRoad(8, 0, 50);       // jump ramp up
    addRoad(4, 0, 0);        // air
    addRoad(8, 0, -50);      // land down
    addRoad(15, -3, 0);      // left
    addRoad(15, 3, 0);       // right (S-curve)
    addRoad(25, 0, 0);       // long straight
    addRoad(20, 5, 0);       // sharp right
    addRoad(10, 0, 0);       // straight
    addRoad(15, -2, 0);      // gentle left
    addRoad(10, 0, 0);       // finish straight
    
    totalLength = segments.length * SEG_LEN;
}

// ==========================
// PLAYER
// ==========================
var playerX = 0;       // -1 to 1 across road
var playerZ = 0;       // distance along track
var speed = 0;
var maxSpeed = 300;

var crashed = false;
var crashTimer = 0;
var lapTime = 0;
var bestLap = null;
var lapStart = 0;
var laps = 0;

// ==========================
// DRONES (other cars)
// ==========================
var drones = [];
function spawnDrones() {
    drones = [];
    for (var i = 0; i < 4; i++) {
        drones.push({
            z: (i + 1) * Math.floor(totalLength / 5),
            x: (Math.random() - 0.5) * 0.5,
            speed: 120 + Math.random() * 60
        });
    }
}

// ==========================
// INPUT
// ==========================
var keys = {};
document.addEventListener('keydown', function(e) { keys[e.code] = true; });
document.addEventListener('keyup', function(e) { keys[e.code] = false; });

// ==========================
// UPDATE
// ==========================
function update(dt) {
    if (crashed) {
        crashTimer -= dt;
        if (crashTimer <= 0) {
            crashed = false;
            speed = 0;
            // Put back on road
            playerX = 0;
        }
        return;
    }
    
    // Accelerate / brake
    if (keys['ArrowUp'] || keys['KeyW']) {
        speed += 150 * dt;
    } else if (keys['ArrowDown'] || keys['KeyS']) {
        speed -= 300 * dt;
    } else {
        speed -= 40 * dt; // coast friction
    }
    speed = Math.max(0, Math.min(maxSpeed, speed));
    
    // Steer
    var steer = 0;
    if (keys['ArrowLeft'] || keys['KeyA']) steer = -1;
    if (keys['ArrowRight'] || keys['KeyD']) steer = 1;
    
    playerX += steer * dt * 2.5;
    
    // Road curvature pushes car
    var segIdx = Math.floor(playerZ / SEG_LEN) % segments.length;
    var seg = segments[segIdx];
    playerX += seg.curve * (speed / maxSpeed) * dt * 0.3;
    
    // Off-road
    if (Math.abs(playerX) > 1.0) {
        speed *= 0.95; // slow down off-road
    }
    if (Math.abs(playerX) > 1.5) {
        crashed = true;
        crashTimer = 1.5;
        return;
    }
    
    // Move forward
    playerZ += speed * dt;
    
    // Lap
    if (playerZ >= totalLength) {
        playerZ -= totalLength;
        laps++;
        var lt = (Date.now() - lapStart) / 1000;
        if (!bestLap || lt < bestLap) bestLap = lt;
        lapStart = Date.now();
    }
    
    lapTime = (Date.now() - lapStart) / 1000;
    
    // Update drones
    for (var i = 0; i < drones.length; i++) {
        var d = drones[i];
        d.z += d.speed * dt;
        if (d.z >= totalLength) d.z -= totalLength;
        
        // Collision
        var dz = d.z - playerZ;
        if (dz < 0) dz += totalLength;
        if (dz < SEG_LEN * 1.5 && Math.abs(d.x - playerX) < 0.25) {
            crashed = true;
            crashTimer = 1.5;
        }
    }
}

// ==========================
// RENDER
// ==========================
function render() {
    // Sky
    var skyG = ctx.createLinearGradient(0, 0, 0, H * 0.5);
    skyG.addColorStop(0, '#1a1a50');
    skyG.addColorStop(1, '#80b0e0');
    ctx.fillStyle = skyG;
    ctx.fillRect(0, 0, W, H);
    
    var baseIdx = Math.floor(playerZ / SEG_LEN) % segments.length;
    var baseOffset = (playerZ % SEG_LEN) / SEG_LEN; // how far into current segment
    
    // Camera height from road
    var camHeight = 250;
    var baseSeg = segments[baseIdx];
    camHeight += baseSeg.y * baseOffset * 0.5;
    
    // Store projected positions for each segment
    var projected = [];
    var x = 0;
    var dx = 0;
    var maxy = H; // clip below this
    
    for (var n = 0; n < 200; n++) {
        var idx = (baseIdx + n) % segments.length;
        var seg = segments[idx];
        
        // Cumulative curve offset
        dx += seg.curve;
        
        // Z distance from camera
        var z = (n - baseOffset) * SEG_LEN;
        if (z <= 0) { projected.push(null); continue; }
        
        // Camera-relative Y (elevation)
        var segY = seg.y * n * 0.01;
        
        // Perspective projection
        var scale = 120 / z;
        var projY = H * 0.45 - (segY - camHeight * 0.01) * scale * 20;
        var projX = W / 2 + (dx * scale * 0.8 - playerX * ROAD_W * scale);
        var projW = ROAD_W * scale;
        
        projected.push({ x: projX, y: projY, w: projW, scale: scale, idx: idx });
    }
    
    // Draw from back to front
    for (var n = 199; n > 0; n--) {
        var p1 = projected[n];
        var p2 = projected[n - 1];
        if (!p1 || !p2) continue;
        if (p1.y < 0 && p2.y < 0) continue;
        
        var dark = ((baseIdx + n) % 4 < 2);
        
        // Grass
        var grassCol = dark ? '#1a5a1a' : '#2a7a2a';
        ctx.fillStyle = grassCol;
        ctx.fillRect(0, p1.y, W, p2.y - p1.y + 1);
        
        // Road
        var roadCol = dark ? '#444' : '#555';
        drawQuad(p1.x - p1.w, p1.y, p1.w * 2, p2.x - p2.w, p2.y, p2.w * 2, roadCol);
        
        // Kerbs
        var kerbCol = dark ? '#ff0000' : '#ffffff';
        var kw1 = p1.w * 0.06, kw2 = p2.w * 0.06;
        drawQuad(p1.x - p1.w - kw1, p1.y, kw1, p2.x - p2.w - kw2, p2.y, kw2, kerbCol);
        drawQuad(p1.x + p1.w, p1.y, kw1, p2.x + p2.w, p2.y, kw2, kerbCol);
        
        // Center dashes
        if (!dark) {
            var cw1 = p1.w * 0.02, cw2 = p2.w * 0.02;
            drawQuad(p1.x - cw1, p1.y, cw1 * 2, p2.x - cw2, p2.y, cw2 * 2, '#ffffff');
        }
    }
    
    // Draw drones
    for (var i = 0; i < drones.length; i++) {
        var d = drones[i];
        var dz = d.z - playerZ;
        if (dz < 0) dz += totalLength;
        var dSegN = Math.floor(dz / SEG_LEN);
        if (dSegN < 1 || dSegN >= 199) continue;
        
        var p = projected[dSegN];
        if (!p) continue;
        
        var carX = p.x + (d.x - playerX) * p.w;
        var carY = p.y;
        var carS = p.scale * 150;
        
        if (carS < 2 || carY < 0 || carY > H) continue;
        
        // Simple car shape
        ctx.fillStyle = '#cc2200';
        ctx.fillRect(carX - carS * 0.5, carY - carS * 0.5, carS, carS * 0.35);
        ctx.fillStyle = '#881100';
        ctx.fillRect(carX - carS * 0.35, carY - carS * 0.8, carS * 0.7, carS * 0.35);
        ctx.fillStyle = '#88ccff';
        ctx.fillRect(carX - carS * 0.2, carY - carS * 0.75, carS * 0.4, carS * 0.2);
    }
    
    // Dashboard
    drawDashboard();
    
    // Crash
    if (crashed) {
        ctx.fillStyle = 'rgba(255,50,0,0.4)';
        ctx.fillRect(0, 0, W, H);
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 60px Courier New';
        ctx.textAlign = 'center';
        ctx.fillText('CRASH!', W / 2, H / 2);
        ctx.font = '20px Courier New';
        ctx.fillText('Returning to road...', W / 2, H / 2 + 40);
    }
}

function drawQuad(x1, y1, w1, x2, y2, w2, color) {
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(x1 + w1, y1);
    ctx.lineTo(x2 + w2, y2);
    ctx.lineTo(x2, y2);
    ctx.closePath();
    ctx.fill();
}

function drawDashboard() {
    var dh = H * 0.15;
    var dy = H - dh;
    
    ctx.fillStyle = 'rgba(20,20,30,0.9)';
    ctx.fillRect(0, dy, W, dh);
    ctx.strokeStyle = '#555';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(0, dy); ctx.lineTo(W, dy); ctx.stroke();
    
    var mph = Math.floor(speed);
    var gear = speed < 60 ? 1 : speed < 130 ? 2 : speed < 220 ? 3 : 4;
    
    // Speed
    ctx.fillStyle = '#0f0';
    ctx.font = 'bold ' + Math.floor(dh * 0.5) + 'px Courier New';
    ctx.textAlign = 'left';
    ctx.fillText(mph + ' MPH', 20, dy + dh * 0.6);
    
    // Gear
    ctx.fillStyle = '#ff0';
    ctx.font = Math.floor(dh * 0.3) + 'px Courier New';
    ctx.fillText('GEAR ' + gear, 20, dy + dh * 0.9);
    
    // Lap
    ctx.fillStyle = '#fff';
    ctx.font = Math.floor(dh * 0.35) + 'px Courier New';
    ctx.textAlign = 'right';
    ctx.fillText('LAP ' + laps, W - 20, dy + dh * 0.45);
    ctx.fillText(lapTime.toFixed(1) + 's', W - 20, dy + dh * 0.75);
    if (bestLap) {
        ctx.fillStyle = '#0f0';
        ctx.fillText('BEST ' + bestLap.toFixed(1) + 's', W - 20, dy + dh * 0.95);
    }
    
    // Tachometer bar
    var rpm = ((speed % 80) / 80);
    var barX = W * 0.3, barW = W * 0.4, barH = dh * 0.15;
    ctx.fillStyle = '#333';
    ctx.fillRect(barX, dy + dh * 0.4, barW, barH);
    ctx.fillStyle = rpm > 0.8 ? '#f00' : '#0a0';
    ctx.fillRect(barX, dy + dh * 0.4, barW * rpm, barH);
    ctx.fillStyle = '#aaa';
    ctx.font = Math.floor(dh * 0.18) + 'px Courier New';
    ctx.textAlign = 'center';
    ctx.fillText('RPM', barX + barW / 2, dy + dh * 0.35);
    
    // Controls
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.font = '12px Courier New';
    ctx.fillText('↑/W: Gas  ↓/S: Brake  ←/A →/D: Steer', W / 2, dy - 5);
}

// ==========================
// LOOP
// ==========================
var lastT = 0;
function frame(t) {
    var dt = Math.min((t - lastT) / 1000, 0.04);
    lastT = t;
    update(dt);
    render();
    requestAnimationFrame(frame);
}

buildTrack();
spawnDrones();
lapStart = Date.now();
requestAnimationFrame(frame);
</script>
</body>
</html>
