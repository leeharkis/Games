<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hard Drivin'</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;font-family:'Courier New',monospace}
canvas{display:block;width:100vw;height:100vh}
</style>
</head>
<body>
<canvas id="cv"></canvas>
<script>
var cv = document.getElementById('cv'), ctx = cv.getContext('2d');
var W, H;
function resize() { W = cv.width = window.innerWidth; H = cv.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);

// ==========================
// TRACK - each segment has a z position, curve, and y (height)
// ==========================
var segLen = 100;
var roadW = 1200;
var segs = [];
var trackLen;

function addSegs(n, curve, hill) {
    for (var i = 0; i < n; i++) {
        var prevY = segs.length > 0 ? segs[segs.length - 1].worldY : 0;
        segs.push({
            worldY: prevY + hill,
            curve: curve,
            worldZ: segs.length * segLen
        });
    }
}

function buildTrack() {
    segs = [];
    addSegs(40, 0, 0);
    addSegs(30, 3, 0);
    addSegs(20, 0, 0);
    addSegs(20, 0, 20);
    addSegs(10, 0, -5);
    addSegs(20, 0, -20);
    addSegs(30, -4, 0);
    addSegs(20, 0, 0);
    addSegs(25, 2, 0);
    addSegs(10, 0, 40);
    addSegs(5, 0, 0);
    addSegs(10, 0, -40);
    addSegs(25, -3, 0);
    addSegs(25, 4, 0);
    addSegs(40, 0, 0);
    addSegs(30, 5, 0);
    addSegs(20, 0, 0);
    addSegs(25, -3, 0);
    addSegs(20, 0, 0);
    trackLen = segs.length * segLen;
}

// ==========================
// GAME STATE
// ==========================
var pos = 0;        // z position along track
var playerX = 0;    // -1 to 1
var speed = 0;
var maxSpeed = 14000;

var crashed = false;
var crashTimer = 0;
var lapTime = 0;
var bestLap = null;
var lapStart = 0;
var laps = 0;

var drones = [];
function spawnDrones() {
    drones = [];
    for (var i = 0; i < 4; i++) {
        drones.push({
            z: (i + 1) * Math.floor(trackLen / 5),
            x: (Math.random() - 0.5) * 0.5,
            speed: 5000 + Math.random() * 3000
        });
    }
}

var keys = {};
document.addEventListener('keydown', function(e) { keys[e.code] = true; });
document.addEventListener('keyup', function(e) { keys[e.code] = false; });

// ==========================
// UPDATE
// ==========================
function update(dt) {
    if (crashed) {
        crashTimer -= dt;
        if (crashTimer <= 0) {
            crashed = false;
            speed = 0;
            playerX = 0;
            for (var i = 0; i < drones.length; i++) {
                var dz = drones[i].z - pos;
                if (dz < 0) dz += trackLen;
                if (dz < segLen * 20) drones[i].z = (pos + segLen * 50) % trackLen;
            }
        }
        return;
    }

    if (keys['ArrowUp'] || keys['KeyW']) speed += 10000 * dt;
    else if (keys['ArrowDown'] || keys['KeyS']) speed -= 20000 * dt;
    else speed -= 3000 * dt;
    speed = Math.max(0, Math.min(maxSpeed, speed));

    var steer = 0;
    if (keys['ArrowLeft'] || keys['KeyA']) steer = -1;
    if (keys['ArrowRight'] || keys['KeyD']) steer = 1;
    playerX += steer * dt * 3;

    // Centrifugal force from curves
    var segIdx = Math.floor(pos / segLen) % segs.length;
    playerX += segs[segIdx].curve * (speed / maxSpeed) * dt * 0.6;

    // Off road
    if (Math.abs(playerX) > 1) speed *= (1 - dt * 2);
    if (Math.abs(playerX) > 1.8) { crashed = true; crashTimer = 1.5; return; }
    playerX = Math.max(-2, Math.min(2, playerX));

    pos += speed * dt;
    if (pos >= trackLen) {
        pos -= trackLen;
        laps++;
        var lt = (Date.now() - lapStart) / 1000;
        if (!bestLap || lt < bestLap) bestLap = lt;
        lapStart = Date.now();
    }
    lapTime = (Date.now() - lapStart) / 1000;

    // Drones
    for (var i = 0; i < drones.length; i++) {
        var d = drones[i];
        d.z += d.speed * dt;
        if (d.z >= trackLen) d.z -= trackLen;
        var dz = d.z - pos; if (dz < 0) dz += trackLen;
        if (dz < segLen * 2 && Math.abs(d.x - playerX) < 0.3) {
            crashed = true; crashTimer = 1.5;
        }
    }
}

// ==========================
// RENDER - scanline-based pseudo-3D
// ==========================
function render() {
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, W, H);

    var dashH = Math.floor(H * 0.14);
    var roadH = H - dashH;
    var horizonY = Math.floor(roadH * 0.4);

    // Sky
    var skyG = ctx.createLinearGradient(0, 0, 0, horizonY);
    skyG.addColorStop(0, '#0a0a30');
    skyG.addColorStop(1, '#5080b0');
    ctx.fillStyle = skyG;
    ctx.fillRect(0, 0, W, horizonY);

    // Render road scanline by scanline from horizon to bottom
    var baseSegIdx = Math.floor(pos / segLen) % segs.length;
    var basePercent = (pos % segLen) / segLen;

    // Look ahead to get curve direction for vanishing point shift
    var lookAhead = 0;
    for (var la = 0; la < 40; la++) {
        lookAhead += segs[(baseSegIdx + la) % segs.length].curve;
    }
    var vanishX = W / 2 + lookAhead * 8;

    for (var y = horizonY; y < roadH; y++) {
        var perspective = (y - horizonY) / (roadH - horizonY);
        if (perspective < 0.001) continue;
        var z = 10 / perspective;

        var worldZ = pos + z * segLen;
        var segIdx = Math.floor(worldZ / segLen) % segs.length;
        var seg = segs[segIdx];

        // Accumulate curve from camera to this point
        var curveDist = segIdx - baseSegIdx;
        if (curveDist < 0) curveDist += segs.length;
        var curveSum = 0;
        for (var c = 0; c < Math.min(curveDist, 80); c++) {
            curveSum += segs[(baseSegIdx + c) % segs.length].curve;
        }

        // Road center: interpolate from player position (bottom) toward vanishing point (horizon)
        var roadCenterX = vanishX * (1 - perspective) + (W / 2) * perspective;
        // Add curve displacement that increases with depth
        roadCenterX += curveSum * perspective * 4;
        // Player lateral offset
        roadCenterX -= playerX * 400 * perspective;

        // Road width at this depth
        var rw = roadW * perspective;

        // Elevation
        var elev = (seg.worldY - segs[baseSegIdx].worldY) * perspective * 0.3;

        var drawY = y - elev;
        if (drawY < horizonY || drawY >= roadH) continue;

        // Stripe pattern
        var stripe = (segIdx % 6 < 3);

        // Grass
        ctx.fillStyle = stripe ? '#1a6a1a' : '#2a7a2a';
        ctx.fillRect(0, drawY, W, 1);

        // Road surface
        ctx.fillStyle = stripe ? '#3a3a3a' : '#4a4a4a';
        ctx.fillRect(roadCenterX - rw / 2, drawY, rw, 1);

        // Kerbs
        var kw = rw * 0.04;
        ctx.fillStyle = stripe ? '#cc0000' : '#ffffff';
        ctx.fillRect(roadCenterX - rw / 2 - kw, drawY, kw, 1);
        ctx.fillRect(roadCenterX + rw / 2, drawY, kw, 1);

        // Center line
        if (!stripe) {
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(roadCenterX - 2, drawY, 4, 1);
        }
    }

    // Draw drones
    for (var i = 0; i < drones.length; i++) {
        var d = drones[i];
        var dz = d.z - pos; if (dz < 0) dz += trackLen;
        var dDepth = dz / segLen;
        if (dDepth < 1 || dDepth > 80) continue;

        var perspective = 10 / dDepth;
        var screenY = horizonY + perspective * (roadH - horizonY);
        if (screenY < horizonY || screenY > roadH) continue;

        // Curve offset for drone position
        var dSegIdx = Math.floor(d.z / segLen) % segs.length;
        var curveDist2 = dSegIdx - baseSegIdx; if (curveDist2 < 0) curveDist2 += segs.length;
        var curveSum2 = 0;
        for (var c = 0; c < Math.min(curveDist2, 80); c++) {
            curveSum2 += segs[(baseSegIdx + c) % segs.length].curve;
        }
        var dScreenX = vanishX * (1 - perspective) + (W/2) * perspective + curveSum2 * perspective * 4 + (d.x - playerX) * 400 * perspective;

        var carW = 60 * perspective;
        var carH = 30 * perspective;
        if (carW < 4) continue;

        ctx.fillStyle = '#cc2200';
        ctx.fillRect(dScreenX - carW/2, screenY - carH, carW, carH * 0.6);
        ctx.fillStyle = '#991100';
        ctx.fillRect(dScreenX - carW*0.35, screenY - carH*1.3, carW*0.7, carH*0.5);
        ctx.fillStyle = '#80ccff';
        ctx.fillRect(dScreenX - carW*0.2, screenY - carH*1.25, carW*0.4, carH*0.3);
    }

    // Dashboard
    var dy = roadH;
    ctx.fillStyle = '#1a1a1a';
    ctx.fillRect(0, dy, W, dashH);
    ctx.strokeStyle = '#444'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(0, dy); ctx.lineTo(W, dy); ctx.stroke();

    var mph = Math.floor(speed / 50);
    var gear = mph < 40 ? 1 : mph < 90 ? 2 : mph < 160 ? 3 : 4;
    ctx.fillStyle = '#0f0';
    ctx.font = 'bold ' + Math.floor(dashH*0.5) + 'px Courier New';
    ctx.textAlign = 'left';
    ctx.fillText(mph + ' MPH', 20, dy + dashH*0.6);
    ctx.fillStyle = '#ff0';
    ctx.font = Math.floor(dashH*0.3) + 'px Courier New';
    ctx.fillText('GEAR ' + gear, 20, dy + dashH*0.9);

    ctx.fillStyle = '#fff';
    ctx.font = Math.floor(dashH*0.35) + 'px Courier New';
    ctx.textAlign = 'right';
    ctx.fillText('LAP ' + laps, W-20, dy + dashH*0.4);
    ctx.fillText(lapTime.toFixed(1) + 's', W-20, dy + dashH*0.7);
    if (bestLap) { ctx.fillStyle='#0f0'; ctx.fillText('BEST '+bestLap.toFixed(1)+'s', W-20, dy+dashH*0.95); }

    // RPM bar
    var rpm = (speed % 4000) / 4000;
    var bx = W*0.35, bw = W*0.3, bh = dashH*0.15;
    ctx.fillStyle = '#333'; ctx.fillRect(bx, dy+dashH*0.4, bw, bh);
    ctx.fillStyle = rpm > 0.8 ? '#f00' : '#0a0'; ctx.fillRect(bx, dy+dashH*0.4, bw*rpm, bh);

    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.font = '12px Courier New'; ctx.textAlign = 'center';
    ctx.fillText('↑/W:Gas ↓/S:Brake ←/A →/D:Steer', W/2, dy-5);

    if (crashed) {
        ctx.fillStyle = 'rgba(200,0,0,0.5)';
        ctx.fillRect(0, 0, W, roadH);
        ctx.fillStyle = '#fff'; ctx.font = 'bold 50px Courier New'; ctx.textAlign = 'center';
        ctx.fillText('CRASH!', W/2, roadH*0.4);
    }
}

// ==========================
// LOOP
// ==========================
var lastT = 0;
function frame(t) {
    var dt = Math.min((t - lastT) / 1000, 0.04);
    lastT = t;
    update(dt);
    render();
    requestAnimationFrame(frame);
}

buildTrack();
spawnDrones();
lapStart = Date.now();
requestAnimationFrame(frame);
</script>
</body>
</html>
