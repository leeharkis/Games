<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dots</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    padding: 20px;
}

.container {
    background: white;
    border-radius: 12px;
    padding: 20px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.3);
    max-width: fit-content;
    width: fit-content;
}

.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
    width: 100%;
    gap: 40px;
}

h1 {
    color: #333;
    font-size: 28px;
}

.stats {
    display: flex;
    gap: 20px;
    align-items: center;
}

.stat {
    text-align: center;
}

.stat-label {
    color: #666;
    font-size: 11px;
    text-transform: uppercase;
    display: block;
}

.stat-value {
    color: #333;
    font-size: 20px;
    font-weight: bold;
    display: block;
}

#timer {
    font-size: 24px;
    font-weight: bold;
    color: #667eea;
}

#timer.warning {
    color: #ff6b6b;
}

canvas {
    border: 3px solid #667eea;
    border-radius: 8px;
    display: block;
    margin: 0 auto 20px;
    cursor: crosshair;
    background: white;
}

.info {
    text-align: center;
    color: #666;
    font-size: 14px;
    margin-bottom: 20px;
}

.controls {
    display: flex;
    gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
}

button {
    padding: 10px 20px;
    font-size: 14px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-weight: bold;
    transition: all 0.3s ease;
}

.btn-primary {
    background: #667eea;
    color: white;
}

.btn-primary:hover {
    background: #5568d3;
    transform: translateY(-2px);
    box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
}

.btn-secondary {
    background: #f093fb;
    color: white;
}

.btn-secondary:hover {
    background: #e074db;
}

.modal {
    display: none;
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: white;
    border-radius: 12px;
    padding: 30px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    z-index: 300;
    max-width: 500px;
    width: 90%;
    text-align: center;
}

.modal.active {
    display: block;
}

.modal h2 {
    color: #2e7d32;
    font-size: 24px;
    margin-bottom: 15px;
}

.modal p {
    color: #666;
    margin-bottom: 10px;
    font-size: 16px;
}

.modal-overlay {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.6);
    z-index: 299;
}

.modal-overlay.active {
    display: block;
}

.game-over-modal h2 {
    color: #667eea !important;
}

@media (max-width: 480px) {
    .header {
        flex-direction: column;
        gap: 15px;
    }

    .stats {
        width: 100%;
        justify-content: space-around;
    }

    canvas {
        max-width: 100%;
    }
}
</style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>DOTS</h1>
        <div class="stats">
            <div class="stat">
                <div class="stat-label">Score</div>
                <div class="stat-value" id="score">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">Time</div>
                <div class="stat-value" id="timer">60</div>
            </div>
        </div>
    </div>

    <div class="info">Connect 4+ circles of the same color by dragging. Double-click to clear all of one color!</div>

    <canvas id="gameCanvas" width="480" height="480"></canvas>

    <div class="controls">
        <button class="btn-primary" onclick="game.showModeSelection()">New Game</button>
    </div>
</div>

<div class="modal-overlay" id="modeOverlay"></div>
<div class="modal" id="modeModal">
    <h2>Game Mode</h2>
    <p>Choose how to play:</p>
    <div class="controls" style="flex-direction: column; margin-top: 20px;">
        <button class="btn-primary" onclick="game.startGameWithMode('time')">60 Second Challenge</button>
        <button class="btn-secondary" onclick="game.startGameWithMode('moves')">25 Moves Challenge</button>
    </div>
</div>

<div class="modal-overlay" id="gameOverOverlay"></div>
<div class="modal game-over-modal" id="gameOverModal">
    <h2>Game Over!</h2>
    <p id="finalScore">Final Score: 0</p>
    <p id="modeInfo"></p>
    <div id="topScoresDisplay" style="text-align: left; margin: 20px 0; background: #f5f5f5; padding: 15px; border-radius: 8px; font-size: 13px;">
        <strong>Top 5 Scores:</strong>
        <div id="topScoresList"></div>
    </div>
    <button class="btn-primary" onclick="game.showModeSelection()">Play Again</button>
</div>

<script>
const Colors = ['#FF0000', '#0099FF', '#FFFF00', '#00CC33', '#FF00FF', '#FF6600', '#00FFFF', '#FFAA00'];

class DotsGame {
    constructor() {
        this.canvas = document.getElementById('gameCanvas');
        this.ctx = this.canvas.getContext('2d');
        this.gridSize = 8;
        this.cellSize = this.canvas.width / this.gridSize;
        this.circleRadius = this.cellSize * 0.35;
        this.grid = [];
        this.score = 0;
        this.timeLeft = 60;
        this.movesLeft = 25;
        this.gameActive = false;
        this.gameMode = null;
        this.timerInterval = null;
        this.selectedDots = [];
        this.selectedLine = [];
        this.lastChainLength = 0;
        this.highScores = this.loadHighScores();
        this.doubleClickThreshold = 300;
        this.lastClickTime = 0;
        this.lastClickPos = null;

        this.canvas.addEventListener('mousedown', (e) => this.handleMouseDown(e));
        this.canvas.addEventListener('mousemove', (e) => this.handleMouseMove(e));
        this.canvas.addEventListener('mouseup', (e) => this.handleMouseUp(e));
        this.canvas.addEventListener('touchstart', (e) => this.handleTouchStart(e));
        this.canvas.addEventListener('touchmove', (e) => this.handleTouchMove(e));
        this.canvas.addEventListener('touchend', (e) => this.handleTouchEnd(e));

        this.showModeSelection();
    }

    loadHighScores() {
        const saved = localStorage.getItem('dotsHighScores');
        return saved ? JSON.parse(saved) : [];
    }

    saveHighScores() {
        localStorage.setItem('dotsHighScores', JSON.stringify(this.highScores));
    }

    addHighScore(score, mode) {
        const entry = { score, mode, date: new Date().toLocaleDateString() };
        this.highScores.push(entry);
        this.highScores.sort((a, b) => b.score - a.score);
        this.highScores = this.highScores.slice(0, 10);
        this.saveHighScores();
    }

    showModeSelection() {
        document.getElementById('modeModal').classList.add('active');
        document.getElementById('modeOverlay').classList.add('active');
    }

    startGameWithMode(mode) {
        this.gameMode = mode;
        document.getElementById('modeModal').classList.remove('active');
        document.getElementById('modeOverlay').classList.remove('active');
        this.newGame();
    }

    newGame() {
        this.generateGrid();
        this.score = 0;
        this.timeLeft = 60;
        this.movesLeft = 25;
        this.gameActive = true;
        this.selectedDots = [];
        this.selectedLine = [];
        this.lastChainLength = 0;
        document.getElementById('score').textContent = '0';
        document.getElementById('timer').textContent = this.gameMode === 'time' ? '60' : '25';
        document.getElementById('gameOverModal').classList.remove('active');
        document.getElementById('gameOverOverlay').classList.remove('active');

        clearInterval(this.timerInterval);
        if (this.gameMode === 'time') {
            this.timerInterval = setInterval(() => this.updateTimer(), 1000);
        }

        this.render();
    }

    generateGrid() {
        this.grid = [];
        for (let i = 0; i < this.gridSize; i++) {
            this.grid[i] = [];
            for (let j = 0; j < this.gridSize; j++) {
                this.grid[i][j] = Math.floor(Math.random() * Colors.length);
            }
        }
    }

    updateTimer() {
        if (!this.gameActive) return;
        
        this.timeLeft--;
        document.getElementById('timer').textContent = this.timeLeft;
        
        const timerEl = document.getElementById('timer');
        if (this.timeLeft <= 10) {
            timerEl.classList.add('warning');
        } else {
            timerEl.classList.remove('warning');
        }

        if (this.timeLeft <= 0) {
            this.endGame();
        }
    }

    endGame() {
        this.gameActive = false;
        clearInterval(this.timerInterval);
        this.addHighScore(this.score, this.gameMode);
        document.getElementById('finalScore').textContent = `Final Score: ${this.score}`;
        document.getElementById('modeInfo').textContent = 
            this.gameMode === 'time' ? 'Time Challenge Complete!' : 'Moves Challenge Complete!';
        this.displayTopScores();
        document.getElementById('gameOverModal').classList.add('active');
        document.getElementById('gameOverOverlay').classList.add('active');
    }

    displayTopScores() {
        const topScoresList = document.getElementById('topScoresList');
        topScoresList.innerHTML = '';
        for (let i = 0; i < Math.min(5, this.highScores.length); i++) {
            const score = this.highScores[i];
            const modeLabel = score.mode === 'time' ? '⏱' : '🎯';
            topScoresList.innerHTML += `<div style="padding: 5px 0; border-bottom: 1px solid #ddd;">${i + 1}. ${score.score} ${modeLabel}</div>`;
        }
    }

    getDotAtPos(x, y) {
        const rect = this.canvas.getBoundingClientRect();
        const canvasX = x - rect.left;
        const canvasY = y - rect.top;

        for (let i = 0; i < this.gridSize; i++) {
            for (let j = 0; j < this.gridSize; j++) {
                const cx = j * this.cellSize + this.cellSize / 2;
                const cy = i * this.cellSize + this.cellSize / 2;
                const dist = Math.sqrt((canvasX - cx) ** 2 + (canvasY - cy) ** 2);
                if (dist <= this.circleRadius) {
                    return { row: i, col: j };
                }
            }
        }
        return null;
    }

    isAdjacent(dot1, dot2) {
        const dr = Math.abs(dot1.row - dot2.row);
        const dc = Math.abs(dot1.col - dot2.col);
        return (dr === 0 && dc === 1) || (dr === 1 && dc === 0) || (dr === 1 && dc === 1);
    }

    handleMouseDown(e) {
        if (!this.gameActive) return;
        
        const currentTime = new Date().getTime();
        const dot = this.getDotAtPos(e.clientX, e.clientY);
        
        if (!dot) return;

        if (this.lastClickTime && (currentTime - this.lastClickTime) < this.doubleClickThreshold) {
            const lastPos = this.lastClickPos;
            if (lastPos && dot.row === lastPos.row && dot.col === lastPos.col) {
                this.doubleClickDot(dot);
                this.lastClickTime = 0;
                return;
            }
        }

        this.lastClickTime = currentTime;
        this.lastClickPos = dot;
        this.startSelection(dot);
    }

    handleMouseMove(e) {
        if (!this.gameActive || this.selectedDots.length === 0) return;
        const dot = this.getDotAtPos(e.clientX, e.clientY);
        if (dot) this.updateSelection(dot);
    }

    handleMouseUp() {
        if (!this.gameActive) return;
        this.finishSelection();
    }

    handleTouchStart(e) {
        if (!this.gameActive) return;
        e.preventDefault();
        const touch = e.touches[0];
        const dot = this.getDotAtPos(touch.clientX, touch.clientY);
        if (dot) this.startSelection(dot);
    }

    handleTouchMove(e) {
        if (!this.gameActive || this.selectedDots.length === 0) return;
        e.preventDefault();
        const touch = e.touches[0];
        const dot = this.getDotAtPos(touch.clientX, touch.clientY);
        if (dot) this.updateSelection(dot);
    }

    handleTouchEnd(e) {
        if (!this.gameActive) return;
        e.preventDefault();
        this.finishSelection();
    }

    startSelection(dot) {
        this.selectedDots = [dot];
        this.selectedLine = [this.getDotCenter(dot)];
    }

    updateSelection(dot) {
        const lastDot = this.selectedDots[this.selectedDots.length - 1];
        
        if (dot.row === lastDot.row && dot.col === lastDot.col) return;

        if (this.grid[dot.row][dot.col] === this.grid[lastDot.row][lastDot.col] && this.isAdjacent(dot, lastDot)) {
            this.selectedDots.push(dot);
            this.selectedLine.push(this.getDotCenter(dot));
        } else if (this.selectedDots.length >= 2) {
            const prevDot = this.selectedDots[this.selectedDots.length - 2];
            if (dot.row === prevDot.row && dot.col === prevDot.col) {
                this.selectedDots.pop();
                this.selectedLine.pop();
            }
        }

        this.render();
    }

    finishSelection() {
        if (this.selectedDots.length >= 4) {
            const chainLength = this.selectedDots.length;
            const points = chainLength * 10;
            this.score += points;
            this.lastChainLength = Math.max(this.lastChainLength, chainLength);
            
            this.removeAllDotsOfColor();
            
            if (this.gameMode === 'moves') {
                this.movesLeft--;
                document.getElementById('timer').textContent = this.movesLeft;
                if (this.movesLeft <= 0) {
                    this.endGame();
                }
            }
        }

        this.selectedDots = [];
        this.selectedLine = [];
        this.render();
        document.getElementById('score').textContent = this.score;
    }

    doubleClickDot(dot) {
        if (this.grid[dot.row][dot.col] === -1) return;
        
        const colorToRemove = this.grid[dot.row][dot.col];
        const countRemoved = this.countDotsOfColor(colorToRemove);
        
        for (let i = 0; i < this.gridSize; i++) {
            for (let j = 0; j < this.gridSize; j++) {
                if (this.grid[i][j] === colorToRemove) {
                    this.grid[i][j] = -1;
                }
            }
        }

        this.score += Math.max(10, countRemoved * 3);

        this.dropDots();

        if (this.gameMode === 'moves') {
            this.movesLeft--;
            document.getElementById('timer').textContent = this.movesLeft;
            if (this.movesLeft <= 0) {
                this.endGame();
            }
        }

        this.render();
        document.getElementById('score').textContent = this.score;
    }

    countDotsOfColor(color) {
        let count = 0;
        for (let i = 0; i < this.gridSize; i++) {
            for (let j = 0; j < this.gridSize; j++) {
                if (this.grid[i][j] === color) count++;
            }
        }
        return count;
    }

    removeAllDotsOfColor() {
        if (this.selectedDots.length === 0) return;
        const color = this.grid[this.selectedDots[0].row][this.selectedDots[0].col];
        
        for (let i = 0; i < this.gridSize; i++) {
            for (let j = 0; j < this.gridSize; j++) {
                if (this.grid[i][j] === color) {
                    this.grid[i][j] = -1;
                }
            }
        }

        this.dropDots();
    }

    getDotCenter(dot) {
        const x = dot.col * this.cellSize + this.cellSize / 2;
        const y = dot.row * this.cellSize + this.cellSize / 2;
        return { x, y };
    }

    drawCircle(row, col, color, opacity = 1) {
        const x = col * this.cellSize + this.cellSize / 2;
        const y = row * this.cellSize + this.cellSize / 2;

        this.ctx.fillStyle = color;
        this.ctx.globalAlpha = opacity;
        this.ctx.beginPath();
        this.ctx.arc(x, y, this.circleRadius, 0, Math.PI * 2);
        this.ctx.fill();
        
        this.ctx.strokeStyle = '#fff';
        this.ctx.lineWidth = 2;
        this.ctx.stroke();
        
        this.ctx.globalAlpha = 1;
    }

    dropDots() {
        for (let col = 0; col < this.gridSize; col++) {
            let writePos = this.gridSize - 1;
            for (let row = this.gridSize - 1; row >= 0; row--) {
                if (this.grid[row][col] !== -1) {
                    if (row !== writePos) {
                        this.grid[writePos][col] = this.grid[row][col];
                        this.grid[row][col] = -1;
                    }
                    writePos--;
                }
            }
        }

        for (let row = 0; row < this.gridSize; row++) {
            for (let col = 0; col < this.gridSize; col++) {
                if (this.grid[row][col] === -1) {
                    this.grid[row][col] = Math.floor(Math.random() * Colors.length);
                }
            }
        }
    }

    render() {
        this.ctx.fillStyle = '#f8f9fa';
        this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);

        this.ctx.strokeStyle = '#eee';
        this.ctx.lineWidth = 1;
        for (let i = 0; i <= this.gridSize; i++) {
            this.ctx.beginPath();
            this.ctx.moveTo(i * this.cellSize, 0);
            this.ctx.lineTo(i * this.cellSize, this.canvas.height);
            this.ctx.stroke();

            this.ctx.beginPath();
            this.ctx.moveTo(0, i * this.cellSize);
            this.ctx.lineTo(this.canvas.width, i * this.cellSize);
            this.ctx.stroke();
        }

        for (let i = 0; i < this.gridSize; i++) {
            for (let j = 0; j < this.gridSize; j++) {
                if (this.grid[i][j] !== -1) {
                    const isSelected = this.selectedDots.some(t => t.row === i && t.col === j);
                    const opacity = isSelected ? 1 : 0.8;
                    this.drawCircle(i, j, Colors[this.grid[i][j]], opacity);

                    if (isSelected) {
                        this.ctx.strokeStyle = '#000';
                        this.ctx.lineWidth = 4;
                        const x = j * this.cellSize + this.cellSize / 2;
                        const y = i * this.cellSize + this.cellSize / 2;
                        this.ctx.beginPath();
                        this.ctx.arc(x, y, this.circleRadius, 0, Math.PI * 2);
                        this.ctx.stroke();
                    }
                }
            }
        }

        if (this.selectedLine.length > 0) {
            this.ctx.strokeStyle = '#000';
            this.ctx.lineWidth = 4;
            this.ctx.lineJoin = 'round';
            this.ctx.lineCap = 'round';
            this.ctx.beginPath();
            this.ctx.moveTo(this.selectedLine[0].x, this.selectedLine[0].y);
            for (let i = 1; i < this.selectedLine.length; i++) {
                this.ctx.lineTo(this.selectedLine[i].x, this.selectedLine[i].y);
            }
            this.ctx.stroke();
        }
    }
}

const game = new DotsGame();
</script>

</body>
</html>
